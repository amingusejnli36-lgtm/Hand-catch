<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>HandDraw Pro X</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #1e293b, #020617);
    color: white;
}

video {
    position: absolute;
    top: 0;
    left: 0;
    transform: scaleX(-1);
    opacity: 0.2;
}

canvas {
    position: absolute;
    top: 0;
    left: 0;
}

/* UI PANEL */
.panel {
    position: fixed;
    top: 20px;
    left: 20px;
    background: rgba(15, 23, 42, 0.7);
    backdrop-filter: blur(15px);
    padding: 15px;
    border-radius: 15px;
    display: flex;
    gap: 10px;
    align-items: center;
    box-shadow: 0 0 25px rgba(0,0,0,0.5);
}

button {
    background: linear-gradient(135deg, #3b82f6, #06b6d4);
    border: none;
    padding: 10px 14px;
    border-radius: 10px;
    color: white;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.05);
}

input[type=color] {
    width: 40px;
    height: 40px;
    border: none;
    cursor: pointer;
}

.slider {
    width: 100px;
}

.title {
    position: fixed;
    bottom: 20px;
    left: 20px;
    opacity: 0.6;
    font-size: 14px;
}
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div class="panel">
    <button onclick="clearCanvas()">🧹 Очистить</button>
    <input type="color" id="color" value="#00f5ff">
    <input type="range" min="1" max="20" value="5" id="size" class="slider">
    <button onclick="toggleNeon()">✨ Неон</button>
</div>

<div class="title">HandDraw Pro X — управление рукой ✋</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let lastX = null;
let lastY = null;
let neon = false;

function clearCanvas() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
}

function toggleNeon() {
    neon = !neon;
}

// HANDS
const hands = new Hands({
    locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
    maxNumHands: 1,
    modelComplexity: 1,
    minDetectionConfidence: 0.7,
    minTrackingConfidence: 0.7
});

hands.onResults(results => {
    if (!results.multiHandLandmarks) {
        lastX = lastY = null;
        return;
    }

    const lm = results.multiHandLandmarks[0];

    const index = lm[8];
    const middle = lm[12];

    const x = index.x * canvas.width;
    const y = index.y * canvas.height;

    const dist = Math.hypot(index.x - middle.x, index.y - middle.y);

    const drawing = dist < 0.05;

    if (drawing) {
        const color = document.getElementById('color').value;
        const size = document.getElementById('size').value;

        ctx.strokeStyle = color;
        ctx.lineWidth = size;
        ctx.lineCap = "round";

        if (neon) {
            ctx.shadowBlur = 25;
            ctx.shadowColor = color;
        } else {
            ctx.shadowBlur = 0;
        }

        if (lastX !== null) {
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(x, y);
            ctx.stroke();
        }

        lastX = x;
        lastY = y;
    } else {
        lastX = lastY = null;
    }
});

// CAMERA
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
    video.srcObject = stream;

    const camera = new Camera(video, {
        onFrame: async () => {
            await hands.send({ image: video });
        },
        width: 640,
        height: 480
    });

    camera.start();
})
.catch(() => {
    alert("Камера не работает — проверь доступ или открой через GitHub Pages");
});
</script>

</body>
</html>
