<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HandDraw Pro X</title>

<style>
* { 
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    background: #020617;
    color: white;
    width: 100vw;
    height: 100vh;
}

#videoContainer {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
}

video {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scaleX(-1);
    min-width: 100%;
    min-height: 100%;
    width: auto;
    height: auto;
    opacity: 0.3;
    filter: brightness(1) contrast(1);
}

canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
}

.panel {
    position: fixed;
    top: 20px;
    left: 20px;
    background: rgba(15, 23, 42, 0.85);
    backdrop-filter: blur(15px);
    padding: 15px;
    border-radius: 15px;
    display: flex;
    gap: 10px;
    align-items: center;
    box-shadow: 0 0 25px rgba(0,0,0,0.5);
    z-index: 1000;
}

button {
    background: linear-gradient(135deg, #3b82f6, #06b6d4);
    border: none;
    padding: 10px 14px;
    border-radius: 10px;
    color: white;
    cursor: pointer;
    transition: 0.2s;
    font-size: 14px;
}

button:hover {
    transform: scale(1.05);
}

button:active {
    transform: scale(0.95);
}

input[type=color] {
    width: 40px;
    height: 40px;
    border: none;
    cursor: pointer;
    border-radius: 8px;
}

.slider {
    width: 100px;
}

.title {
    position: fixed;
    bottom: 20px;
    left: 20px;
    opacity: 0.6;
    font-size: 14px;
    z-index: 1000;
}

.status {
    position: fixed;
    top: 20px;
    right: 20px;
    background: rgba(15, 23, 42, 0.85);
    backdrop-filter: blur(15px);
    padding: 10px 15px;
    border-radius: 10px;
    font-size: 12px;
    z-index: 1000;
}

.status.drawing {
    background: rgba(34, 197, 94, 0.3);
    border: 2px solid #22c55e;
}
</style>
</head>

<body>

<div id="videoContainer">
    <video id="video" autoplay playsinline muted></video>
</div>

<canvas id="canvas"></canvas>

<div class="panel">
    <button onclick="clearCanvas()">🧹 Очистить</button>
    <input type="color" id="color" value="#00f5ff">
    <input type="range" min="2" max="25" value="8" id="size" class="slider" title="Размер кисти">
    <button onclick="toggleNeon()">✨ Неон</button>
</div>

<div class="status" id="status">Ожидание руки...</div>
<div class="title">HandDraw Pro X — сведи указательный и средний пальцы для рисования ✋</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const status = document.getElementById('status');

// Устанавливаем размер canvas на весь экран
function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

resizeCanvas();
window.addEventListener('resize', resizeCanvas);

let lastX = null;
let lastY = null;
let neon = false;
let isDrawing = false;

function clearCanvas() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
}

function toggleNeon() {
    neon = !neon;
}

// Инициализация MediaPipe Hands
const hands = new Hands({
    locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
    maxNumHands: 1,
    modelComplexity: 1,
    minDetectionConfidence: 0.8,
    minTrackingConfidence: 0.8
});

hands.onResults(results => {
    if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
        lastX = lastY = null;
        isDrawing = false;
        status.textContent = "Ожидание руки...";
        status.classList.remove('drawing');
        return;
    }

    const landmarks = results.multiHandLandmarks[0];

    // Указательный палец (кончик)
    const indexTip = landmarks[8];
    // Средний палец (кончик)
    const middleTip = landmarks[12];

    // Преобразуем координаты в координаты canvas
    const x = indexTip.x * canvas.width;
    const y = indexTip.y * canvas.height;

    // Вычисляем расстояние между кончиками пальцев
    const distance = Math.sqrt(
        Math.pow((indexTip.x - middleTip.x) * canvas.width, 2) +
        Math.pow((indexTip.y - middleTip.y) * canvas.height, 2)
    );

    // Если пальцы близко - рисуем (порог ~ 30-50 пикселей)
    const drawingThreshold = 50;
    const shouldDraw = distance < drawingThreshold;

    if (shouldDraw) {
        isDrawing = true;
        status.textContent = "✏️ Рисование...";
        status.classList.add('drawing');

        const color = document.getElementById('color').value;
        const size = parseInt(document.getElementById('size').value);

        ctx.strokeStyle = color;
        ctx.lineWidth = size;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";

        if (neon) {
            ctx.shadowBlur = 20;
            ctx.shadowColor = color;
        } else {
            ctx.shadowBlur = 0;
        }

        if (lastX !== null && lastY !== null) {
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(x, y);
            ctx.stroke();
        }

        lastX = x;
        lastY = y;
    } else {
        if (isDrawing) {
            isDrawing = false;
            status.textContent = "✋ Рука обнаружена";
            status.classList.remove('drawing');
        }
        lastX = lastY = null;
    }
});

// Запуск камеры с правильными настройками
navigator.mediaDevices.getUserMedia({ 
    video: {
        width: { ideal: 1280 },
        height: { ideal: 720 },
        facingMode: 'user'
    } 
})
.then(stream => {
    video.srcObject = stream;
    
    video.onloadedmetadata = () => {
        const camera = new Camera(video, {
            onFrame: async () => {
                await hands.send({ image: video });
            },
            width: 1280,
            height: 720
        });
        
        camera.start();
    };
})
.catch(err => {
    console.error("Ошибка камеры:", err);
    alert("⚠️ Не удалось получить доступ к камере.\n\nПроверь:\n1. Разрешение на камеру в браузере\n2. Открыт ли файл через HTTPS или локальный сервер\n3. Камера не используется другим приложением");
});
</script>

</body>
</html>
